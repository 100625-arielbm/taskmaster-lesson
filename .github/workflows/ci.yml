on:
  pull_request:
    branches: [main]

jobs:
  ci_workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Check code
        uses: actions/checkout@v4.3.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name : Run tests
        run : pytest tests/